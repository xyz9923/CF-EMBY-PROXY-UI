name: Fork Sync

permissions:
    contents: write

on:
    schedule:
        - cron: "0 0 * * *"  # 每天午夜执行自动同步
    workflow_dispatch:  # 允许在 GitHub Actions 页面手动触发

# 新增这一段：强制所有 JS Actions 使用 Node.js 24 运行，消除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    sync_with_upstream:
        name: Sync with Upstream
        runs-on: ubuntu-latest
        if: ${{ github.event.repository.fork }}

        steps:
            - name: Checkout target repo
              # 这里从 v4 升级到了 v6
              uses: actions/checkout@v6
              with:
                token: ${{ secrets.GITHUB_TOKEN }}

            - name: Sync Upstream
              # 这里我帮你升到了这个插件最新的小版本 v3.4.1
              uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
              with:
                  target_repo_token: ${{ secrets.GITHUB_TOKEN }}
                  upstream_sync_repo: axuitomo/CF-EMBY-PROXY-UI
                  upstream_sync_branch: main
                  target_sync_branch: main
                  test_mode: false

            - name: Check for new commits
              if: success()
              run: echo "Sync completed successfully"

            - name: Check for Failure
              if: failure()
              run: |
                  echo "[Error] Sync failed. This might be due to:"
                  echo "1. Changes in the upstream workflow file"
                  echo "2. Merge conflicts that need manual resolution"
                  echo "3. Network issues"
                  echo "Please check the logs and consider manual sync if needed."
                  exit 1
